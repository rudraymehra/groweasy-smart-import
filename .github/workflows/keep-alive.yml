# Pings the Render free-tier API every 10 minutes so it never hits the
# 15-minute idle spin-down — reviewers get an instant first request instead
# of a ~40s cold start. GitHub cron is best-effort, so an occasional delayed
# ping (and thus a rare cold start) is still possible.
name: keep-alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 90 --retry 2 \
            https://groweasy-smart-import-api.onrender.com/api/health)
          echo "health responded with HTTP $code"
          [ "$code" = "200" ]
